name: AIBTC News Signal

on:
  schedule:
    - cron: '0 3 * * *'    # 03:00 UTC
    - cron: '0 7 * * *'    # 07:00 UTC
    - cron: '0 11 * * *'   # 11:00 UTC
    - cron: '0 15 * * *'   # 15:00 UTC
    - cron: '0 19 * * *'   # 19:00 UTC
  workflow_dispatch:         # allow manual trigger

jobs:
  news-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news signal
        env:
          CLIENT_MNEMONIC: ${{ secrets.AIBTC_MNEMONIC }}
        run: node news-signal.js

      - name: Commit filed-ids.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add filed-ids.txt
          git diff --staged --quiet || git commit -m "ci: record filed paper IDs [skip ci]"
          git push
