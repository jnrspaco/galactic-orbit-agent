name: AIBTC News Signal

on:
  schedule:
    - cron: '7 6 * * *'    # 06:07 UTC — morning
    - cron: '11 13 * * *'  # 13:11 UTC — afternoon
    - cron: '3 20 * * *'   # 20:03 UTC — evening
  workflow_dispatch:         # allow manual trigger

jobs:
  news-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news signal
        env:
          CLIENT_MNEMONIC: ${{ secrets.AIBTC_MNEMONIC }}
        run: node news-signal.js
